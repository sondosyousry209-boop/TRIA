<!DOCTYPE html>

<html lang="en">

<head>

```
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>TRIA Admin Dashboard</title>

<link rel="stylesheet"
      href="style.css">
```

</head>

<body>

```
<!-- ================= HEADER ================= -->

<header>

    <nav>


        <div class="logo-container">

            <img
                src="images/logo.png"
                alt="TRIA Logo"
                class="logo"
            >

        </div>


        <ul>


            <li>

                <a href="index.html">

                    Back to Website

                </a>

            </li>


            <li>

                <button id="logoutBtn">

                    Logout

                </button>

            </li>


        </ul>

    </nav>

</header>


<!-- ================= ADMIN DASHBOARD ================= -->

<section class="admin-dashboard">


    <div class="dashboard-header">


        <span>

            TRIA

        </span>


        <h1>

            Admin Dashboard

        </h1>


        <p>

            Manage your orders and track your business.

        </p>


    </div>


    <!-- ================= DASHBOARD CARDS ================= -->


    <div class="dashboard-cards">


        <div class="dashboard-card">


            <h3>

                Total Orders

            </h3>


            <strong id="totalOrders">

                0

            </strong>


        </div>


        <div class="dashboard-card">


            <h3>

                Pending Orders

            </h3>


            <strong id="pendingOrders">

                0

            </strong>


        </div>


        <div class="dashboard-card">


            <h3>

                Total Revenue

            </h3>


            <strong id="totalRevenue">

                0 EGP

            </strong>


        </div>


    </div>


    <!-- ================= ORDERS ================= -->


    <div class="orders-section">


        <h2>

            Recent Orders

        </h2>


        <table>


            <thead>


                <tr>


                    <th>

                        Customer

                    </th>


                    <th>

                        Phone

                    </th>


                    <th>

                        Governorate

                    </th>


                    <th>

                        Total

                    </th>


                    <th>

                        Status

                    </th>


                    <th>

                        Action

                    </th>


                </tr>


            </thead>


            <tbody id="ordersTable">

                <!-- Orders will appear here -->

            </tbody>


        </table>


    </div>


</section>


<!-- ================= ORDER DETAILS POPUP ================= -->


<div id="orderModal"
     class="order-modal">


    <div class="order-modal-content">


        <button
            class="close-modal"
            onclick="closeOrderModal()"
        >

            ×

        </button>


        <h2>

            Order Details

        </h2>


        <div id="orderDetails">

            <!-- Order details will appear here -->

        </div>


    </div>


</div>


<!-- ================= SUPABASE LIBRARY ================= -->


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<!-- ================= ADMIN SCRIPT ================= -->


<script>


    // ================= SUPABASE CONNECTION =================


    const SUPABASE_URL =

        "https://qguofdaattdrbwbgtwuw.supabase.co";


    const SUPABASE_KEY =

        "sb_publishable_8n45f-xVky4i3zyJFrxk3A_PjhJLvzu";


    const supabaseClient =

        supabase.createClient(

            SUPABASE_URL,

            SUPABASE_KEY

        );


    // ================= CHECK ADMIN LOGIN =================


    async function checkAdminLogin() {


        const {

            data: {

                session

            }

        } = await supabaseClient

            .auth

            .getSession();


        if (!session) {


            window.location.href =

                "admin-login.html";


            return false;

        }


        return true;

    }


    // ================= ELEMENTS =================


    const totalOrders =

        document.getElementById(

            "totalOrders"

        );


    const pendingOrders =

        document.getElementById(

            "pendingOrders"

        );


    const totalRevenue =

        document.getElementById(

            "totalRevenue"

        );


    const ordersTable =

        document.getElementById(

            "ordersTable"

        );


    // ================= LOAD ORDERS =================


    async function loadOrders() {


        const {

            data: orders,

            error

        } = await supabaseClient

            .from("orders")

            .select("*");


        if (error) {


            console.error(

                "SUPABASE ERROR:",

                error

            );


            return;

        }


        // ================= TOTAL ORDERS =================


        totalOrders.innerHTML =

            orders.length;


        // ================= PENDING ORDERS =================


        const pending =

            orders.filter(

                order =>

                    order.status ===

                    "Pending"

            ).length;


        pendingOrders.innerHTML =

            pending;


        // ================= TOTAL REVENUE =================


        const revenue =

            orders.reduce(

                (

                    total,

                    order

                ) =>


                    total +

                    Number(

                        order.total

                    ),


                0

            );


        totalRevenue.innerHTML =

            revenue +

            " EGP";


        // ================= DISPLAY ORDERS =================


        ordersTable.innerHTML = "";


        orders.forEach(

            order => {


                const row =

                    document.createElement(

                        "tr"

                    );


                row.innerHTML = `


                    <td>

                        ${order.name}

                    </td>


                    <td>

                        ${order.phone}

                    </td>


                    <td>

                        ${order.governorate}

                    </td>


                    <td>

                        ${order.total}

                        EGP

                    </td>


                    <td>


                        <select

                            class="status-select"

                            onchange="updateOrderStatus(

                                ${order.id},

                                this.value

                            )"

                        >


                            <option

                                value="Pending"

                                ${

                                    order.status ===

                                    "Pending"

                                        ? "selected"

                                        : ""

                                }

                            >

                                Pending

                            </option>


                            <option

                                value="Processing"

                                ${

                                    order.status ===

                                    "Processing"

                                        ? "selected"

                                        : ""

                                }

                            >

                                Processing

                            </option>


                            <option

                                value="Shipped"

                                ${

                                    order.status ===

                                    "Shipped"

                                        ? "selected"

                                        : ""

                                }

                            >

                                Shipped

                            </option>


                            <option

                                value="Delivered"

                                ${

                                    order.status ===

                                    "Delivered"

                                        ? "selected"

                                        : ""

                                }

                            >

                                Delivered

                            </option>


                            <option

                                value="Cancelled"

                                ${

                                    order.status ===

                                    "Cancelled"

                                        ? "selected"

                                        : ""

                                }

                            >

                                Cancelled

                            </option>


                        </select>


                    </td>


                    <td>


                        <button

                            class="view-btn"

                            onclick='viewOrderDetails(${JSON.stringify(order)})'

                        >

                            View Details

                        </button>


                        <button

                            class="delete-btn"

                            onclick="deleteOrder(

                                ${order.id}

                            )"

                        >

                            Delete

                        </button>


                    </td>


                `;


                ordersTable.appendChild(

                    row

                );

            }

        );

    }


    // ================= UPDATE ORDER STATUS =================


    async function updateOrderStatus(

        orderId,

        newStatus

    ) {


        const {

            error

        } = await supabaseClient

            .from("orders")

            .update({

                status:

                    newStatus

            })

            .eq(

                "id",

                orderId

            );


        if (error) {


            console.error(

                "UPDATE ERROR:",

                error

            );


            showToast(

                "Could not update order status."

            );


            return;

        }


        showToast(

            "Order status updated successfully!"

        );


        loadOrders();

    }


    // ================= DELETE ORDER =================


    async function deleteOrder(

        orderId

    ) {


        const confirmDelete =

            confirm(

                "Are you sure you want to delete this order?"

            );


        if (!confirmDelete) {

            return;

        }


        const {

            error

        } = await supabaseClient

            .from("orders")

            .delete()

            .eq(

                "id",

                orderId

            );


        if (error) {


            console.error(

                "DELETE ERROR:",

                error

            );


            showToast(

                "Could not delete order."

            );


            return;

        }


        showToast(

            "Order deleted successfully!"

        );


        loadOrders();

    }


    // ================= VIEW ORDER DETAILS =================


    function viewOrderDetails(

        order

    ) {


        const orderDetails =

            document.getElementById(

                "orderDetails"

            );


        orderDetails.innerHTML = `


            <p>

                <strong>

                    Customer:

                </strong>

                ${order.name}

            </p>


            <p>

                <strong>

                    Email:

                </strong>

                ${order.email}

            </p>


            <p>

                <strong>

                    Phone:

                </strong>

                ${order.phone}

            </p>


            <p>

                <strong>

                    Address:

                </strong>

                ${order.address}

            </p>


            <p>

                <strong>

                    Governorate:

                </strong>

                ${order.governorate}

            </p>


            <p>

                <strong>

                    Payment Method:

                </strong>

                ${order.payment}

            </p>


            <p>

                <strong>

                    Products:

                </strong>

                ${order.products}

            </p>


            <p>

                <strong>

                    Subtotal:

                </strong>

                ${order.subtotal}

                EGP

            </p>


            <p>

                <strong>

                    Shipping:

                </strong>

                ${order.shipping}

                EGP

            </p>


            <p>

                <strong>

                    Total:

                </strong>

                ${order.total}

                EGP

            </p>


            <p>

                <strong>

                    Order Date:

                </strong>

                ${order.order_date}

            </p>


        `;


        document

            .getElementById(

                "orderModal"

            )

            .classList

            .add(

                "show"

            );

    }


    // ================= CLOSE ORDER MODAL =================


    function closeOrderModal() {


        document

            .getElementById(

                "orderModal"

            )

            .classList

            .remove(

                "show"

            );

    }


    // ================= LOGOUT =================


    const logoutBtn =

        document.getElementById(

            "logoutBtn"

        );


    logoutBtn.addEventListener(

        "click",

        async function() {


            await supabaseClient

                .auth

                .signOut();


            window.location.href =

                "admin-login.html";


        }

    );


    // ================= START =================


    async function startAdminDashboard() {


        const isLoggedIn =

            await checkAdminLogin();


        if (isLoggedIn) {


            loadOrders();

        }

    }


    startAdminDashboard();


</script>
```
<div id="toast"></div>
</body>

</html>
