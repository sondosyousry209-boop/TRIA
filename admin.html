<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>TRIA Admin Dashboard</title>


    <link
        rel="stylesheet"
        href="style.css"
    >

</head>


<body>


    <!-- ================= HEADER ================= -->

    <header>

        <nav>


            <div class="logo-container">

                <img
                    src="images/logo.png"
                    alt="TRIA Logo"
                    class="logo"
                >

            </div>


            <ul>


                <li>

                    <a href="index.html">

                        Back to Website

                    </a>

                </li>


                <li>

                    <button id="logoutBtn">

                        Logout

                    </button>

                </li>


            </ul>

        </nav>

    </header>


    <!-- ================= ADMIN DASHBOARD ================= -->

    <section class="admin-dashboard">


        <!-- ================= DASHBOARD HEADER ================= -->

        <div class="dashboard-header">


            <span>

                TRIA

            </span>


            <h1>

                Admin Dashboard

            </h1>


            <p>

                Manage your orders and track your business.

            </p>


        </div>


        <!-- ================= DASHBOARD CARDS ================= -->

        <div class="dashboard-cards">


            <div class="dashboard-card">


                <h3>

                    Total Orders

                </h3>


                <strong id="totalOrders">

                    0

                </strong>


            </div>


            <div class="dashboard-card">


                <h3>

                    Pending Orders

                </h3>


                <strong id="pendingOrders">

                    0

                </strong>


            </div>


            <div class="dashboard-card">


                <h3>

                    Total Revenue

                </h3>


                <strong id="totalRevenue">

                    0 EGP

                </strong>


            </div>


        </div>


        <!-- ================= ORDERS ================= -->

        <div class="orders-section">


            <h2>

                Recent Orders

            </h2>


            <table>


                <thead>


                    <tr>


                        <th>

                            Customer

                        </th>


                        <th>

                            Phone

                        </th>


                        <th>

                            Governorate

                        </th>


                        <th>

                            Total

                        </th>


                        <th>

                            Status

                        </th>


                        <th>

                            Action

                        </th>


                    </tr>


                </thead>


                <tbody id="ordersTable">

                    <!-- Orders appear here -->

                </tbody>


            </table>


        </div>


        <!-- ================= CUSTOMER MESSAGES ================= -->

        <div class="orders-section messages-section">


            <h2>

                Customer Messages

            </h2>


            <table>


                <thead>


                    <tr>


                        <th>

                            Name

                        </th>


                        <th>

                            Email

                        </th>


                        <th>

                            Message

                        </th>


                        <th>

                            Action

                        </th>


                    </tr>


                </thead>


                <tbody id="messagesTable">

                    <!-- Messages appear here -->

                </tbody>


            </table>


        </div>


    </section>


    <!-- ================= ORDER DETAILS POPUP ================= -->

    <div
        id="orderModal"
        class="order-modal"
    >


        <div class="order-modal-content">


            <button
                class="close-modal"
                onclick="closeOrderModal()"
            >

                ×

            </button>


            <h2>

                Order Details

            </h2>


            <div id="orderDetails">

                <!-- Order details appear here -->

            </div>


        </div>


    </div>


    <!-- ================= MESSAGE DETAILS POPUP ================= -->

    <div
        id="messageModal"
        class="order-modal"
    >


        <div class="order-modal-content">


            <button
                class="close-modal"
                onclick="closeMessageModal()"
            >

                ×

            </button>


            <h2>

                Message Details

            </h2>


            <div id="messageDetails">

                <!-- Message details appear here -->

            </div>


        </div>


    </div>


    <!-- ================= SUPABASE LIBRARY ================= -->

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


    <!-- ================= ADMIN SCRIPT ================= -->

    <script>


        // ================= SUPABASE CONNECTION =================


        const SUPABASE_URL =

            "https://qguofdaattdrbwbgtwuw.supabase.co";


        const SUPABASE_KEY =

            "sb_publishable_8n45f-xVky4i3zyJFrxk3A_PjhJLvzu";


        const supabaseClient =

            supabase.createClient(

                SUPABASE_URL,

                SUPABASE_KEY

            );


        // ================= CHECK ADMIN LOGIN =================


        async function checkAdminLogin() {


            const {

                data: {

                    session

                }

            } = await supabaseClient

                .auth

                .getSession();


            if (!session) {


                window.location.href =

                    "admin-login.html";


                return false;

            }


            return true;

        }


        // ================= ELEMENTS =================


        const totalOrders =

            document.getElementById(

                "totalOrders"

            );


        const pendingOrders =

            document.getElementById(

                "pendingOrders"

            );


        const totalRevenue =

            document.getElementById(

                "totalRevenue"

            );


        const ordersTable =

            document.getElementById(

                "ordersTable"

            );


        const messagesTable =

            document.getElementById(

                "messagesTable"

            );


        // ================= LOAD ORDERS =================


        async function loadOrders() {


            const {

                data: orders,

                error

            } = await supabaseClient

                .from("orders")

                .select("*");


            if (error) {


                console.error(

                    "ORDERS ERROR:",

                    error

                );


                return;

            }


            totalOrders.innerHTML =

                orders.length;


            const pending =

                orders.filter(

                    order =>

                        order.status ===

                        "Pending"

                ).length;


            pendingOrders.innerHTML =

                pending;


            const revenue =

                orders.reduce(

                    (

                        total,

                        order

                    ) =>


                        total +

                        Number(

                            order.total

                        ),


                    0

                );


            totalRevenue.innerHTML =

                revenue +

                " EGP";


            ordersTable.innerHTML = "";


            orders.forEach(

                order => {


                    const row =

                        document.createElement(

                            "tr"

                        );


                    row.innerHTML = `


                        <td>

                            ${order.name || ""}

                        </td>


                        <td>

                            ${order.phone || ""}

                        </td>


                        <td>

                            ${order.governorate || ""}

                        </td>


                        <td>

                            ${order.total || 0}

                            EGP

                        </td>


                        <td>


                            <select

                                class="status-select"

                                onchange="updateOrderStatus(

                                    ${order.id},

                                    this.value

                                )"

                            >


                                <option

                                    value="Pending"

                                    ${

                                        order.status ===

                                        "Pending"

                                            ? "selected"

                                            : ""

                                    }

                                >

                                    Pending

                                </option>


                                <option

                                    value="Processing"

                                    ${

                                        order.status ===

                                        "Processing"

                                            ? "selected"

                                            : ""

                                    }

                                >

                                    Processing

                                </option>


                                <option

                                    value="Shipped"

                                    ${

                                        order.status ===

                                        "Shipped"

                                            ? "selected"

                                            : ""

                                    }

                                >

                                    Shipped

                                </option>


                                <option

                                    value="Delivered"

                                    ${

                                        order.status ===

                                        "Delivered"

                                            ? "selected"

                                            : ""

                                    }

                                >

                                    Delivered

                                </option>


                                <option

                                    value="Cancelled"

                                    ${

                                        order.status ===

                                        "Cancelled"

                                            ? "selected"

                                            : ""

                                    }

                                >

                                    Cancelled

                                </option>


                            </select>


                        </td>


                        <td>


                            <button

                                class="view-btn"

                                onclick='viewOrderDetails(${JSON.stringify(order)})'

                            >

                                View Details

                            </button>


                            <button

                                class="delete-btn"

                                onclick="deleteOrder(

                                    ${order.id}

                                )"

                            >

                                Delete

                            </button>


                        </td>


                    `;


                    ordersTable.appendChild(

                        row

                    );


                }

            );

        }


        // ================= LOAD CUSTOMER MESSAGES =================


        async function loadMessages() {


            console.log(

                "Loading messages..."

            );


            const table =

                document.getElementById(

                    "messagesTable"

                );


            if (!table) {


                console.error(

                    "messagesTable not found"

                );


                return;

            }


            const result =

                await supabaseClient

                    .from("messages")

                    .select("*");


            console.log(

                "MESSAGES RESULT:",

                result

            );


            if (result.error) {


                console.error(

                    "MESSAGES ERROR:",

                    result.error

                );


                table.innerHTML = `


                    <tr>


                        <td colspan="4">


                            Error loading messages


                        </td>


                    </tr>


                `;


                return;

            }


            const messages =

                result.data;


            console.log(

                "MESSAGES DATA:",

                messages

            );


            table.innerHTML = "";


            if (

                !messages ||

                messages.length === 0

            ) {


                table.innerHTML = `


                    <tr>


                        <td colspan="4">


                            No messages found


                        </td>


                    </tr>


                `;


                return;

            }


            messages.forEach(

                message => {


                    const row =

                        document.createElement(

                            "tr"

                        );


                    row.innerHTML = `


                        <td>

                            ${message.name || ""}

                        </td>


                        <td>

                            ${message.email || ""}

                        </td>


                        <td>

                            ${message.message || ""}

                        </td>


                        <td>


                            <button

                                class="view-btn"

                                onclick='viewMessageDetails(${JSON.stringify(message)})'

                            >

                                View Message

                            </button>


                            <button

                                class="delete-btn"

                                onclick="deleteMessage(

                                    ${message.id}

                                )"

                            >

                                Delete

                            </button>


                        </td>


                    `;


                    table.appendChild(

                        row

                    );


                }

            );

        }


        // ================= UPDATE ORDER STATUS =================


        async function updateOrderStatus(

            orderId,

            newStatus

        ) {


            const {

                error

            } = await supabaseClient

                .from("orders")

                .update({

                    status:

                        newStatus

                })

                .eq(

                    "id",

                    orderId

                );


            if (error) {


                console.error(

                    "UPDATE ERROR:",

                    error

                );


                showToast(

                    "Could not update order status."

                );


                return;

            }


            showToast(

                "Order status updated successfully!"

            );


            loadOrders();

        }


        // ================= DELETE ORDER =================


        async function deleteOrder(

            orderId

        ) {


            const confirmDelete =

                confirm(

                    "Are you sure you want to delete this order?"

                );


            if (!confirmDelete) {

                return;

            }


            const {

                error

            } = await supabaseClient

                .from("orders")

                .delete()

                .eq(

                    "id",

                    orderId

                );


            if (error) {


                console.error(

                    "DELETE ORDER ERROR:",

                    error

                );


                showToast(

                    "Could not delete order."

                );


                return;

            }


            showToast(

                "Order deleted successfully!"

            );


            loadOrders();

        }


        // ================= VIEW ORDER DETAILS =================


        function viewOrderDetails(

            order

        ) {


            const details =

                document.getElementById(

                    "orderDetails"

                );


            details.innerHTML = `


                <p>

                    <strong>

                        Customer:

                    </strong>

                    ${order.name || ""}

                </p>


                <p>

                    <strong>

                        Email:

                    </strong>

                    ${order.email || ""}

                </p>


                <p>

                    <strong>

                        Phone:

                    </strong>

                    ${order.phone || ""}

                </p>


                <p>

                    <strong>

                        Address:

                    </strong>

                    ${order.address || ""}

                </p>


                <p>

                    <strong>

                        Governorate:

                    </strong>

                    ${order.governorate || ""}

                </p>


                <p>

                    <strong>

                        Payment Method:

                    </strong>

                    ${order.payment || ""}

                </p>


                <p>

                    <strong>

                        Products:

                    </strong>

                    ${order.products || ""}

                </p>


                <p>

                    <strong>

                        Subtotal:

                    </strong>

                    ${order.subtotal || 0}

                    EGP

                </p>


                <p>

                    <strong>

                        Shipping:

                    </strong>

                    ${order.shipping || 0}

                    EGP

                </p>


                <p>

                    <strong>

                        Total:

                    </strong>

                    ${order.total || 0}

                    EGP

                </p>


                <p>

                    <strong>

                        Order Date:

                    </strong>

                    ${order.order_date || ""}

                </p>


            `;


            document

                .getElementById(

                    "orderModal"

                )

                .classList

                .add(

                    "show"

                );

        }


        // ================= CLOSE ORDER MODAL =================


        function closeOrderModal() {


            document

                .getElementById(

                    "orderModal"

                )

                .classList

                .remove(

                    "show"

                );

        }


        // ================= VIEW MESSAGE DETAILS =================


        function viewMessageDetails(

            message

        ) {


            const details =

                document.getElementById(

                    "messageDetails"

                );


            details.innerHTML = `


                <p>


                    <strong>

                        Name:

                    </strong>


                    ${message.name || ""}


                </p>


                <p>


                    <strong>

                        Email:

                    </strong>


                    ${message.email || ""}


                </p>


                <p>


                    <strong>

                        Message:

                    </strong>


                    ${message.message || ""}


                </p>


            `;


            document

                .getElementById(

                    "messageModal"

                )

                .classList

                .add(

                    "show"

                );

        }


        // ================= CLOSE MESSAGE MODAL =================


        function closeMessageModal() {


            document

                .getElementById(

                    "messageModal"

                )

                .classList

                .remove(

                    "show"

                );

        }


        // ================= DELETE MESSAGE =================


        async function deleteMessage(

            messageId

        ) {


            const confirmDelete =

                confirm(

                    "Are you sure you want to delete this message?"

                );


            if (!confirmDelete) {

                return;

            }


            const {

                error

            } = await supabaseClient

                .from("messages")

                .delete()

                .eq(

                    "id",

                    messageId

                );


            if (error) {


                console.error(

                    "DELETE MESSAGE ERROR:",

                    error

                );


                showToast(

                    "Could not delete message."

                );


                return;

            }


            showToast(

                "Message deleted successfully!"

            );


            loadMessages();

        }


        // ================= LOGOUT =================


        document

            .getElementById(

                "logoutBtn"

            )

            .addEventListener(

                "click",

                async function() {


                    await supabaseClient

                        .auth

                        .signOut();


                    window.location.href =

                        "admin-login.html";


                }

            );


        // ================= TOAST =================


        function showToast(

            message

        ) {


            const toast =

                document.getElementById(

                    "toast"

                );


            toast.textContent =

                message;


            toast.classList.add(

                "show"

            );


            setTimeout(

                function() {


                    toast.classList.remove(

                        "show"

                    );


                },

                3000

            );

        }


        // ================= START DASHBOARD =================


        async function startAdminDashboard() {


            const isLoggedIn =

                await checkAdminLogin();


            if (!isLoggedIn) {

                return;

            }


            await loadOrders();


            await loadMessages();

        }


        startAdminDashboard();


    </script>


    <!-- ================= TOAST ================= -->

    <div id="toast"></div>


</body>

</html>
