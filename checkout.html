<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Checkout - TRIA</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header>

        <nav>

            <div class="logo-container">

                <img src="images/logo.png"
                     alt="TRIA Logo"
                     class="logo">

            </div>

            <div class="menu-toggle"
                 id="menuToggle">

                ☰

            </div>

            <ul id="navLinks">

                <li>
                    <a href="index.html">
                        Home
                    </a>
                </li>

                <li>
                    <a href="shop.html">
                        Shop
                    </a>
                </li>

                <li>
                    <a href="women.html">
                        Women
                    </a>
                </li>

                <li>
                    <a href="men.html">
                        Men
                    </a>
                </li>

                <li>
                    <a href="cart.html">
                        Cart
                    </a>
                </li>

            </ul>

        </nav>

    </header>


    <!-- ================= CHECKOUT ================= -->

    <section class="checkout">

        <div class="checkout-container">

            <div class="checkout-header">

                <span>TRIA</span>

                <h1>
                    Complete Your Order
                </h1>

                <p>
                    Enter your details and choose your preferred payment method.
                </p>

            </div>


            <form id="checkoutForm">


                <!-- CUSTOMER INFORMATION -->

                <div class="checkout-section">

                    <h2>
                        Customer Information
                    </h2>


                    <div class="input-group">

                        <label for="fullName">
                            Full Name
                        </label>

                        <input
                            type="text"
                            id="fullName"
                            placeholder="Enter your full name"
                            required
                        >

                    </div>


                    <div class="input-group">

                        <label for="email">
                            Email Address
                        </label>

                        <input
                            type="email"
                            id="email"
                            placeholder="Enter your email"
                            required
                        >

                    </div>


                    <div class="input-group">

                        <label for="phone">
                            Phone Number
                        </label>

                        <input
                            type="tel"
                            id="phone"
                            placeholder="Enter your phone number"
                            required
                        >

                    </div>


                    <div class="input-group">

                        <label for="address">
                            Full Address
                        </label>

                        <textarea
                            id="address"
                            placeholder="Enter your full address"
                            rows="4"
                            required
                        ></textarea>

                    </div>

                </div>


                <!-- SHIPPING -->

                <div class="checkout-section">

                    <h2>
                        Shipping Information
                    </h2>


                    <div class="input-group">

                        <label for="governorate">
                            Governorate
                        </label>


                        <select
                            id="governorate"
                            required
                        >

                            <option value="50">
                                Cairo — 50 EGP
                            </option>

                            <option value="70">
                                Giza — 70 EGP
                            </option>

                            <option value="80">
                                Alexandria — 80 EGP
                            </option>

                            <option value="100">
                                Other Governorates — 100 EGP
                            </option>

                        </select>

                    </div>

                </div>


                <!-- PAYMENT -->

                <div class="checkout-section">

                    <h2>
                        Payment Method
                    </h2>


                    <div class="payment-options">


                        <label class="payment-option">

                            <input
                                type="radio"
                                name="payment"
                                value="Visa"
                                required
                            >

                            <span>
                                💳 Visa
                            </span>

                        </label>


                        <label class="payment-option">

                            <input
                                type="radio"
                                name="payment"
                                value="Cash"
                                required
                            >

                            <span>
                                💵 Cash on Delivery
                            </span>

                        </label>

                    </div>

                </div>


                <!-- ORDER SUMMARY -->

                <div class="order-summary">

                    <h2>
                        Order Summary
                    </h2>


                    <div class="summary-row">

                        <span>
                            Subtotal
                        </span>

                        <strong id="subtotal">
                            0 EGP
                        </strong>

                    </div>


                    <div class="summary-row">

                        <span>
                            Shipping
                        </span>

                        <strong id="shipping">
                            50 EGP
                        </strong>

                    </div>


                    <div class="summary-total">

                        <span>
                            Total
                        </span>

                        <strong id="totalPrice">
                            0 EGP
                        </strong>

                    </div>

                </div>


                <button
                    type="submit"
                    class="place-order-btn"
                >

                    Place Order

                </button>


            </form>

        </div>

    </section>


    <!-- ================= SUPABASE ================= -->

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


    <!-- ================= CHECKOUT SCRIPT ================= -->

    <script>


        // ================= SUPABASE CONNECTION =================


        const SUPABASE_URL =
    "https://qguofdaattdrbwbgtwuw.supabase.co";


        const SUPABASE_KEY =
            sb_publishable_8n45f-xVky4i3zyJFrxk3A_PjhJLvzu


        const supabaseClient =
            supabase.createClient(

                SUPABASE_URL,

                SUPABASE_KEY

            );


        // ================= ELEMENTS =================


        const governorate =
            document.getElementById(
                "governorate"
            );


        const shipping =
            document.getElementById(
                "shipping"
            );


        const subtotal =
            document.getElementById(
                "subtotal"
            );


        const totalPrice =
            document.getElementById(
                "totalPrice"
            );


        const checkoutForm =
            document.getElementById(
                "checkoutForm"
            );


        // ================= CART =================


        let cart =
            JSON.parse(
                localStorage.getItem(
                    "cart"
                )
            ) || [];


        let productsTotal = 0;


        cart.forEach(

            product => {

                productsTotal +=
                    Number(
                        product.price
                    );

            }

        );


        subtotal.innerHTML =
            productsTotal +
            " EGP";


        // ================= UPDATE TOTAL =================


        function updateTotal() {


            let shippingCost =
                Number(
                    governorate.value
                );


            shipping.innerHTML =
                shippingCost +
                " EGP";


            totalPrice.innerHTML =

                (

                    productsTotal +

                    shippingCost

                ) +

                " EGP";


        }


        updateTotal();


        governorate.addEventListener(

            "change",

            updateTotal

        );


        // ================= SUBMIT ORDER =================


        checkoutForm.addEventListener(

            "submit",

            async function (e) {


                e.preventDefault();


                // Payment method

                const payment =

                    document.querySelector(

                        'input[name="payment"]:checked'

                    ).value;


                // Governorate name

                const governorateName =

                    governorate.options[

                        governorate.selectedIndex

                    ].text;


                // Create order object

                const newOrder = {


                    name:

                        document.getElementById(

                            "fullName"

                        ).value,


                    email:

                        document.getElementById(

                            "email"

                        ).value,


                    phone:

                        document.getElementById(

                            "phone"

                        ).value,


                    address:

                        document.getElementById(

                            "address"

                        ).value,


                    governorate:

                        governorateName,


                    payment:

                        payment,


                    products:

                        cart,


                    subtotal:

                        productsTotal,


                    shipping:

                        Number(

                            governorate.value

                        ),


                    total:

                        productsTotal +

                        Number(

                            governorate.value

                        ),


                    status:

                        "Pending",


                    order_date:

                        new Date()

                            .toLocaleString()

                };


                // ================= SAVE TO SUPABASE =================


                const {

                    data,

                    error

                } =

                    await supabaseClient

                        .from("orders")

                        .insert([

                            newOrder

                        ]);


                // Check for error

                if (error) {


                    console.error(

                        error

                    );


                    alert(

                        "Something went wrong. Please try again."

                    );


                    return;

                }


                // Clear cart

                localStorage.removeItem(

                    "cart"

                );


                // Go to success page

                window.location.href =

                    "success.html";


            }

        );

    </script>


    <!-- ================= MAIN SCRIPT ================= -->

    <script src="script.js"></script>

</body>

</html>
